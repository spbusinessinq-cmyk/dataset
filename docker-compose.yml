version: "3.8"

services:
  app:
    build:
      context: .
    container_name: rsr-data-hub
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      OLLAMA_BASE_URL: http://192.168.12.228:11434
      OLLAMA_MODEL: llama3.2:3b
    volumes:
      - rsr_data:/app/data

volumes:
  rsr_data:
